- name: Generate JSON
  run: |
    python <<EOF
    import pandas as pd
    import json

    df = pd.read_excel("transit.xlsx")
    df = df.fillna("")

    data = []

    for _, row in df.iterrows():
        data.append({
            "po": str(row.iloc[6]),
            "status": str(row.iloc[28]),
            "etd": str(row.iloc[23]),
            "eta": str(row.iloc[27]),
            "po_sent": str(row.iloc[19]),
            "necessity": str(row.iloc[2]),
            "codigo": str(row.iloc[10]),
            "descricao": str(row.iloc[12]),
            "quantidade": str(row.iloc[13]),
            "ip_number": str(row.iloc[5])
        })

    with open("data.json", "w") as f:
        json.dump(data, f, indent=2)

    EOF
