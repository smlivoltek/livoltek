name: Update Dashboard Data

on:
  push:
    paths:
      - 'transit.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Generate JSON
        run: |
          python <<EOF
          import pandas as pd
          import json

          df = pd.read_excel("transit.xlsx")

          df = df.fillna("")

          data = []

          for _, row in df.iterrows():
              data.append({
                  "po": str(row.get("PO", "")),
                  "status": str(row.get("Status", "")),
                  "etd": str(row.get("ETD", "")),
                  "eta": str(row.get("ETA", "")),
                  "po_sent": str(row.get("PO Sent", "")),
                  "necessity": str(row.get("Necessity", "")),
                  "codigo": str(row.get("Código produto", "")),
                  "descricao": str(row.get("Descrição", "")),
                  "quantidade": str(row.get("Quantidade", "")),
                  "ip_number": str(row.get("IP Number", "")),
              })

          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Update data.json"
          git push
